jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 🔥 FIXED (no Node 20 warning)

      # - name: Install deps
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y build-essential cmake python3 clang-format imagemagick libturbojpeg-dev curl
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            python3 \
            clang-format \
            imagemagick \
            libturbojpeg-dev \
            libnuma-dev \
            liburing-dev \
            curl



      - name: Annotate and Check Headers
        run: |
          # 1. Run the fixer first from the root
          python3 imgengine/scripts/add_file_path_on_top.py
          
          # 2. Run the check (should pass now)
          python3 imgengine/scripts/check_headers.py

      - name: Build Engine
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Run format-check
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake --build . --target format-check || (echo "format-check failed" && exit 1)

      - name: Run progressive-JPEG regression
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake --build . --target regression_progressive || (echo "regression_progressive failed" && exit 1)

      - name: Run Tests
        run: |
          if [ -f imgengine/tests/run_all.sh ]; then
            cd imgengine
            ./tests/run_all.sh
          else
            echo "No tests found"
          fi