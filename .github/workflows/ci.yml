name: imgengine-ci

on:
  push:
    branches: ["**"]  # 👈 This allows EVERY branch to trigger the CI
  pull_request:
    branches: ["**"]


jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 🔥 FIXED (no Node 20 warning)

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3 clang-format imagemagick libturbojpeg-dev curl

      # 🔥 STRICT HEADER CHECK (ONLY ENGINE)
      - name: Check Headers (ENGINE ONLY)
        run: python3 scripts/check_headers.py
        # if headers are missing,
        # python3 scripts/add_file_path_on_top.py

      - name: Build Engine
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Run format-check
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake --build . --target format-check || (echo "format-check failed" && exit 1)

      - name: Run progressive-JPEG regression
        run: |
          cd imgengine
          mkdir -p build && cd build
          cmake --build . --target regression_progressive || (echo "regression_progressive failed" && exit 1)

      - name: Run Tests
        run: |
          if [ -f imgengine/tests/run_all.sh ]; then
            cd imgengine
            ./tests/run_all.sh
          else
            echo "No tests found"
          fi